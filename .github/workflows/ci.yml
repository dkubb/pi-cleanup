name: CI

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

defaults:
  run:
    shell: /bin/bash --noprofile --norc -o errexit -o errtrace -o nounset -o pipefail {0}

jobs:
  ci:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Check out branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Check TypeScript formatting (oxfmt)
        run: just fmt-check-ts

      - name: Lint Markdown (mado)
        uses: akiomik/mado@9b5cb3a1d234ddbacad4dd811aaa2a1e671d5306 # v0.3.0
        with:
          args: --config .mado.toml check .

      - name: Lint (oxlint)
        run: just lint

      - name: Type-check (tsc)
        run: just typecheck

      - name: Test (vitest + coverage)
        run: just test
